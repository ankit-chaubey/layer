<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" width="780" height="440">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="780" height="440" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="390" y="40" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, 'SF Mono', monospace" font-size="14" font-weight="600" letter-spacing="2">MTProto 2.0  ·  DH KEY EXCHANGE FLOW</text>
  <line x1="180" y1="52" x2="600" y2="52" stroke="#30363d" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="40" y="64" width="180" height="36" rx="8" fill="#1f2937"/>
  <text x="130" y="87" text-anchor="middle" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="13" font-weight="700">CLIENT</text>

  <rect x="560" y="64" width="180" height="36" rx="8" fill="#1f2937"/>
  <text x="650" y="87" text-anchor="middle" fill="#f87171" font-family="ui-monospace, monospace" font-size="13" font-weight="700">TELEGRAM SERVER</text>

  <!-- Vertical lanes -->
  <line x1="130" y1="100" x2="130" y2="420" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="650" y1="100" x2="650" y2="420" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Step 1 -->
  <rect x="40" y="112" width="180" height="44" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="130" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">step1()</text>
  <text x="130" y="147" text-anchor="middle" fill="#60a5fa" font-family="-apple-system, sans-serif" font-size="11">Generate nonce</text>
  <!-- Arrow right -->
  <line x1="220" y1="134" x2="560" y2="134" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="390" y="126" text-anchor="middle" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="11">req_pq_multi</text>

  <!-- Server response 1 -->
  <rect x="560" y="160" width="180" height="44" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="650" y="178" text-anchor="middle" fill="#9ca3af" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Respond</text>
  <text x="650" y="195" text-anchor="middle" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="11">pq, server fingerprints</text>
  <!-- Arrow left -->
  <line x1="560" y1="180" x2="220" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="390" y="172" text-anchor="middle" fill="#6b7280" font-family="ui-monospace, monospace" font-size="11">ResPQ { pq, server_nonce }</text>

  <!-- Step 2 -->
  <rect x="40" y="208" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="226" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">step2(state1, res_pq)</text>
  <text x="130" y="241" text-anchor="middle" fill="#60a5fa" font-family="-apple-system, sans-serif" font-size="11">Factorize pq</text>
  <text x="130" y="255" text-anchor="middle" fill="#60a5fa" font-family="-apple-system, sans-serif" font-size="11">RSA-encrypt inner data</text>
  <!-- Arrow right -->
  <line x1="220" y1="235" x2="560" y2="235" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="390" y="227" text-anchor="middle" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="11">req_DH_params (RSA)</text>

  <!-- Server response 2 -->
  <rect x="560" y="262" width="180" height="44" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="650" y="280" text-anchor="middle" fill="#9ca3af" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Respond</text>
  <text x="650" y="297" text-anchor="middle" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="11">server DH params (AES)</text>
  <!-- Arrow left -->
  <line x1="560" y1="282" x2="220" y2="282" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="390" y="274" text-anchor="middle" fill="#6b7280" font-family="ui-monospace, monospace" font-size="11">server_DH_params_ok</text>

  <!-- Step 3 -->
  <rect x="40" y="310" width="180" height="56" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="328" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="11" font-weight="600">step3(state2, params)</text>
  <text x="130" y="343" text-anchor="middle" fill="#60a5fa" font-family="-apple-system, sans-serif" font-size="11">Generate g^a mod p</text>
  <text x="130" y="357" text-anchor="middle" fill="#60a5fa" font-family="-apple-system, sans-serif" font-size="11">Compute auth key</text>
  <!-- Arrow right -->
  <line x1="220" y1="337" x2="560" y2="337" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="390" y="329" text-anchor="middle" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="11">set_client_DH_params</text>

  <!-- Server response 3 -->
  <rect x="560" y="365" width="180" height="30" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="650" y="384" text-anchor="middle" fill="#34d399" font-family="ui-monospace, monospace" font-size="11" font-weight="600">dh_gen_ok ✓</text>
  <!-- Arrow left -->
  <line x1="560" y1="380" x2="220" y2="380" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="390" y="372" text-anchor="middle" fill="#34d399" font-family="ui-monospace, monospace" font-size="11">DhGenOk { nonce_hash }</text>

  <!-- Finish -->
  <rect x="40" y="405" width="180" height="28" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="130" y="423" text-anchor="middle" fill="#34d399" font-family="ui-monospace, monospace" font-size="12" font-weight="700">finish() → AuthKey 🔑</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>
</svg>
