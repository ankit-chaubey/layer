<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="client-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="mtproto-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="types-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="crypto-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="gen-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="parser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="390" y="42" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, 'SF Mono', monospace" font-size="15" font-weight="600" letter-spacing="2">LAYER  CRATE  ARCHITECTURE</text>
  <line x1="200" y1="54" x2="580" y2="54" stroke="#30363d" stroke-width="1"/>

  <!-- layer-client -->
  <rect x="60" y="74" width="660" height="68" rx="10" fill="url(#client-grad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="60" y="74" width="4" height="68" rx="2" fill="#93c5fd"/>
  <text x="100" y="102" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="17" font-weight="700">layer-client</text>
  <text x="100" y="124" fill="#bfdbfe" font-family="-apple-system, sans-serif" font-size="13">High-level async API · Auth · Send/Receive · Media · Bots · Sessions</text>
  <text x="700" y="115" fill="#dbeafe" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" opacity="0.8">v0.4.4</text>

  <!-- Arrow down -->
  <line x1="390" y1="142" x2="390" y2="162" stroke="#30363d" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="390,168 385,160 395,160" fill="#30363d"/>

  <!-- layer-mtproto -->
  <rect x="60" y="170" width="660" height="68" rx="10" fill="url(#mtproto-grad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="60" y="170" width="4" height="68" rx="2" fill="#c7d2fe"/>
  <text x="100" y="198" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="17" font-weight="700">layer-mtproto</text>
  <text x="100" y="220" fill="#e0e7ff" font-family="-apple-system, sans-serif" font-size="13">MTProto 2.0 Session · DH Key Exchange · Framing · Salt · Ack</text>
  <text x="700" y="211" fill="#e0e7ff" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" opacity="0.8">v0.4.4</text>

  <!-- Two arrows down from mtproto -->
  <line x1="240" y1="238" x2="240" y2="258" stroke="#30363d" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="240,264 235,256 245,256" fill="#30363d"/>
  <line x1="540" y1="238" x2="540" y2="258" stroke="#30363d" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="540,264 535,256 545,256" fill="#30363d"/>

  <!-- layer-tl-types (left) -->
  <rect x="60" y="266" width="320" height="68" rx="10" fill="url(#types-grad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="60" y="266" width="4" height="68" rx="2" fill="#fef3c7"/>
  <text x="100" y="294" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="17" font-weight="700">layer-tl-types</text>
  <text x="100" y="316" fill="#fef3c7" font-family="-apple-system, sans-serif" font-size="13">2,329 TL Constructors · Enums · Functions</text>

  <!-- layer-crypto (right) -->
  <rect x="400" y="266" width="320" height="68" rx="10" fill="url(#crypto-grad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="400" y="266" width="4" height="68" rx="2" fill="#ede9fe"/>
  <text x="440" y="294" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="17" font-weight="700">layer-crypto</text>
  <text x="440" y="316" fill="#ede9fe" font-family="-apple-system, sans-serif" font-size="13">AES-IGE · RSA · SHA · DH · PQ Factor</text>

  <!-- Arrow from tl-types down -->
  <line x1="220" y1="334" x2="220" y2="354" stroke="#30363d" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="220,360 215,352 225,352" fill="#30363d"/>

  <!-- layer-tl-gen -->
  <rect x="60" y="362" width="320" height="68" rx="10" fill="url(#gen-grad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="60" y="362" width="4" height="68" rx="2" fill="#d1fae5"/>
  <text x="100" y="390" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="17" font-weight="700">layer-tl-gen</text>
  <text x="100" y="412" fill="#d1fae5" font-family="-apple-system, sans-serif" font-size="13">Build-time codegen · TL AST → Rust source</text>

  <!-- Arrow from tl-gen down -->
  <line x1="220" y1="430" x2="220" y2="450" stroke="#30363d" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="220,456 215,448 225,448" fill="#30363d"/>

  <!-- layer-tl-parser -->
  <rect x="60" y="458" width="320" height="44" rx="10" fill="url(#parser-grad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="60" y="458" width="4" height="44" rx="2" fill="#dcfce7"/>
  <text x="100" y="481" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="17" font-weight="700">layer-tl-parser</text>
  <text x="262" y="481" fill="#dcfce7" font-family="-apple-system, sans-serif" font-size="13"> · .tl schema text → AST</text>

  <!-- Side label -->
  <text x="730" y="296" text-anchor="middle" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" transform="rotate(90, 730, 296)">depends on</text>

  <!-- Legend -->
  <rect x="440" y="380" width="280" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="402" fill="#8b949e" font-family="-apple-system, sans-serif" font-size="12" font-weight="600">Legend</text>
  <rect x="460" y="412" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="480" y="423" fill="#c9d1d9" font-family="-apple-system, sans-serif" font-size="12">Application API (start here)</text>
  <rect x="460" y="432" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="480" y="443" fill="#c9d1d9" font-family="-apple-system, sans-serif" font-size="12">Protocol layer</text>
  <rect x="460" y="452" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="480" y="463" fill="#c9d1d9" font-family="-apple-system, sans-serif" font-size="12">Type system &amp; Schema</text>
  <rect x="460" y="472" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="480" y="483" fill="#c9d1d9" font-family="-apple-system, sans-serif" font-size="12">Cryptographic primitives</text>
</svg>
