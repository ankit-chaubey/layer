<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 160" width="780" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="780" height="160" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="6" height="160" fill="url(#accent)" rx="3"/>
  <!-- Icon blocks (mini layer logo) -->
  <rect x="48" y="42" width="52" height="11" rx="4" fill="#3b82f6" opacity="0.9"/>
  <rect x="48" y="57" width="52" height="11" rx="4" fill="#2563eb" opacity="0.95"/>
  <rect x="48" y="72" width="52" height="11" rx="4" fill="#1d4ed8"/>
  <rect x="48" y="87" width="52" height="11" rx="4" fill="#1e40af"/>
  <!-- Wave line above icon -->
  <polyline points="52,38 60,30 68,34 76,28 84,32 92,26 100,30" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="52" cy="38" r="2.5" fill="#93c5fd"/>
  <circle cx="68" cy="34" r="2.5" fill="#93c5fd"/>
  <circle cx="84" cy="32" r="2.5" fill="#93c5fd"/>
  <circle cx="100" cy="30" r="2.5" fill="#93c5fd"/>
  <!-- Text -->
  <text x="120" y="72" fill="white" font-family="ui-monospace, 'SF Mono', monospace" font-size="32" font-weight="800" letter-spacing="-1">layer-client</text>
  <text x="120" y="100" fill="#60a5fa" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15">High-level async Telegram client for Rust</text>
  <text x="120" y="124" fill="#374151" font-family="ui-monospace, monospace" font-size="12">Auth · Messaging · Media · Keyboards · Bots · Sessions · MTProto 2.0</text>
  <!-- Rust badge -->
  <rect x="632" y="56" width="108" height="28" rx="6" fill="#f74c00" opacity="0.15" stroke="#f74c00" stroke-width="1" stroke-opacity="0.5"/>
  <text x="686" y="75" text-anchor="middle" fill="#fb923c" font-family="ui-monospace, monospace" font-size="12" font-weight="600">🦀 Rust 2024</text>
  <!-- Layer badge -->
  <rect x="632" y="92" width="108" height="28" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="686" y="111" text-anchor="middle" fill="#c4b5fd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">TL Layer 224</text>
</svg>
