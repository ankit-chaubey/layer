<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" width="780" height="300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="780" height="300" fill="url(#bg3)" rx="12"/>

  <text x="390" y="38" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, 'SF Mono', monospace" font-size="14" font-weight="600" letter-spacing="2">layer-client  ·  FEATURE FLAGS</text>
  <line x1="220" y1="48" x2="560" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- Default / always on -->
  <text x="40" y="76" fill="#8b949e" font-family="ui-monospace, monospace" font-size="11" font-weight="600">DEFAULT  (always included)</text>
  <rect x="40" y="84" width="160" height="36" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="120" y="103" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">tl-api</text>
  <text x="120" y="115" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="10">All API types</text>

  <rect x="212" y="84" width="160" height="36" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="292" y="103" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">impl-debug</text>
  <text x="292" y="115" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="10">Debug on all types</text>

  <rect x="384" y="84" width="160" height="36" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="464" y="103" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">impl-from-type</text>
  <text x="464" y="115" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="10">Into&lt;Enum&gt; conversions</text>

  <rect x="556" y="84" width="184" height="36" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="648" y="103" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, monospace" font-size="12" font-weight="600">impl-from-enum</text>
  <text x="648" y="115" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="10">TryFrom&lt;Enum&gt; conversions</text>

  <!-- Optional features -->
  <text x="40" y="148" fill="#8b949e" font-family="ui-monospace, monospace" font-size="11" font-weight="600">OPTIONAL  (add to Cargo.toml as needed)</text>

  <!-- Row 1 optional -->
  <rect x="40" y="156" width="160" height="44" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="175" text-anchor="middle" fill="#86efac" font-family="ui-monospace, monospace" font-size="12" font-weight="600">sqlite-session</text>
  <text x="120" y="190" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="10">Persist auth in .db file</text>

  <rect x="212" y="156" width="160" height="44" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="292" y="175" text-anchor="middle" fill="#86efac" font-family="ui-monospace, monospace" font-size="12" font-weight="600">libsql-session</text>
  <text x="292" y="190" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="10">Turso / libSQL backend</text>

  <rect x="384" y="156" width="160" height="44" rx="8" fill="#2d1f0e" stroke="#f59e0b" stroke-width="1"/>
  <text x="464" y="175" text-anchor="middle" fill="#fcd34d" font-family="ui-monospace, monospace" font-size="12" font-weight="600">html</text>
  <text x="464" y="190" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="10">Hand-rolled HTML parser</text>

  <rect x="556" y="156" width="184" height="44" rx="8" fill="#2d1f0e" stroke="#f59e0b" stroke-width="1"/>
  <text x="648" y="175" text-anchor="middle" fill="#fcd34d" font-family="ui-monospace, monospace" font-size="12" font-weight="600">html5ever</text>
  <text x="648" y="190" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="10">Spec-compliant HTML5 tokenizer</text>

  <!-- Row 2 optional -->
  <rect x="40" y="212" width="160" height="44" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="120" y="231" text-anchor="middle" fill="#d8b4fe" font-family="ui-monospace, monospace" font-size="12" font-weight="600">tl-mtproto</text>
  <text x="120" y="246" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="10">Low-level MTProto types</text>

  <rect x="212" y="212" width="160" height="44" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="292" y="231" text-anchor="middle" fill="#d8b4fe" font-family="ui-monospace, monospace" font-size="12" font-weight="600">impl-serde</text>
  <text x="292" y="246" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="10">Serde on all types</text>

  <rect x="384" y="212" width="160" height="44" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="464" y="231" text-anchor="middle" fill="#d8b4fe" font-family="ui-monospace, monospace" font-size="12" font-weight="600">name-for-id</text>
  <text x="464" y="246" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="10">TL ID → name lookup</text>

  <!-- Note -->
  <text x="390" y="280" text-anchor="middle" fill="#4b5563" font-family="ui-monospace, monospace" font-size="11">layer-client re-exports layer_tl_types as layer_client::tl — no extra dependency needed</text>
</svg>
